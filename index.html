<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASCAR Fantasy — Draft Board &amp; Live Leaderboard</title>
  <style>
    tr.muted { color: #aaa; }
    tr.onclock td { font-weight: bold; background: #fff3cd; }
  </style>
</head>
<body>

<h2 id="status">Loading…</h2>

<!-- Race view: shown once every owner has drafted -->
<div id="raceView" style="display:none">
  <h3>Live Leaderboard</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Vehicle Number</th>
        <th>Driver</th>
        <th>Owner</th>
      </tr>
    </thead>
    <tbody id="liveFeedData"></tbody>
  </table>
  <p>Last Updated: <span id="lastUpdate"></span></p>
</div>

<!-- Owner table: draft board during the draft, points table during the race -->
<h3 id="ownerTitle">Owners</h3>
<table border="1">
  <thead id="ownerHead"></thead>
  <tbody id="ownerBody"></tbody>
</table>
<p>Last Updated: <span id="lastUpdateOwners"></span></p>

<script>
  // ---- Configuration -------------------------------------------------

  // Three published-to-web CSV tabs from the same Google Sheet.
  //   Picks tab      - column A = owner, column B = driver. The first row
  //                    holds the literal "owner"/"driver" labels.
  //   Standings tab  - column C = owner, column D = season points entering
  //                    this race. This tab is the canonical full owner list:
  //                    the draft is "complete" when every owner here has a
  //                    pick. Rows whose points cell isn't numeric are skipped.
  //   Draft-order tab- single column of owner names in draft order (this
  //                    week's previous-race finish order), "owner" header.
  //                    Sets board order and who is on the clock. Optional:
  //                    if it can't be loaded the board still works, just
  //                    ordered picks-first / standings order.
  const PICKS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2xTweYJe4Z4kLiNTxaqqaHHEzF9kZelQMQclZ82Eg5X4l7wEfD57iyg5kJA0hedSIdcT_k0p2sLHM/pub?gid=7&single=true&output=csv';
  const STANDINGS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2xTweYJe4Z4kLiNTxaqqaHHEzF9kZelQMQclZ82Eg5X4l7wEfD57iyg5kJA0hedSIdcT_k0p2sLHM/pub?gid=148&single=true&output=csv';
  const DRAFT_ORDER_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2xTweYJe4Z4kLiNTxaqqaHHEzF9kZelQMQclZ82Eg5X4l7wEfD57iyg5kJA0hedSIdcT_k0p2sLHM/pub?gid=4&single=true&output=csv';

  // The series this league picks from: 1 = Cup, 2 = Xfinity, 3 = Trucks.
  const LEAGUE_SERIES_ID = 1;
  const SEASON_YEAR = new Date().getFullYear();
  const SCHEDULE_URL =
    `https://cf.nascar.com/cacher/${SEASON_YEAR}/race_list_basic.json`;
  const LIVE_FEED_URL = 'https://cf.nascar.com/live/feeds/live-feed.json';
  const REFRESH_MS = 60000;
  const FLAG_CHECKERED = 5;   // flag_state value meaning the race is over
  // The season schedule barely changes; cache it instead of re-downloading
  // ~190 KB every refresh.
  const SCHEDULE_TTL_MS = 30 * 60 * 1000;

  // ---- State ---------------------------------------------------------

  // cleaned driver name -> { owner, seasonTotal }; drives the vehicle table.
  let ownerInfo = {};
  // [{ owner, seasonTotal, driver|null }] one per standings owner, in draft
  // order (from the draft-order tab) when available.
  let ownerList = [];
  // true once every standings owner has a pick.
  let draftComplete = false;
  // true once the picks/standings sheets have loaded successfully at least
  // once; until then the page is in its initial "Loading…" state.
  let ownerDataLoaded = false;
  // Cached season schedule: [{ race, t }] sorted oldest first, plus the
  // epoch ms it was fetched.
  let scheduleCache = null;
  let scheduleCacheAt = 0;

  // ---- Utilities -----------------------------------------------------

  function cleanName(s) {
    // Strip rookie/playoff markers (* #) and collapse whitespace.
    return (s || '').replace(/[*#]/g, '').replace(/\s+/g, ' ').trim();
  }

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
    if (field !== '' || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  async function fetchCSV(url) {
    // Cache-buster: the published CSV is cached by the browser, so a poll
    // could otherwise be served a stale copy after a sheet edit.
    const res = await fetch(url + '&_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return parseCSV(await res.text());
  }

  // ---- Owner / pick loading ------------------------------------------

  // Re-read both sheet tabs. On success updates ownerInfo / ownerList /
  // draftComplete and returns true. On failure returns false and leaves any
  // previously loaded data untouched, so a transient blip never replaces a
  // good roster with wrong numbers.
  async function loadOwnerInfo() {
    try {
      // All three tabs come from one sheet but need one request each (the
      // CSV export is per-tab); fetch them at the same time. The draft-order
      // tab is optional, so a failure there yields an empty list rather than
      // sinking the whole load.
      const [pickRows, standingRows, orderRows] = await Promise.all([
        fetchCSV(PICKS_CSV_URL),
        fetchCSV(STANDINGS_CSV_URL),
        fetchCSV(DRAFT_ORDER_CSV_URL).catch(e => {
          console.error('Draft-order load failed:', e); return [];
        }),
      ]);

      // Standings tab: column C = owner, column D = season points.
      const totals = {};
      const standingOwners = [];
      standingRows.forEach(r => {
        const owner = (r[2] || '').trim();
        const pts = Number(r[3]);
        if (owner && !Number.isNaN(pts)) {
          totals[owner.toLowerCase()] = pts;
          standingOwners.push(owner);
        }
      });
      if (standingOwners.length === 0) throw new Error('no standings rows parsed');

      // Draft-order tab: single column of owner names in draft order. Match
      // against known owners (case-insensitive) so the "owner" header and any
      // stray cells are ignored.
      const draftOrder = {};
      let ord = 0;
      orderRows.forEach(r => {
        const key = (r[0] || '').trim().toLowerCase();
        if (key && key in totals && !(key in draftOrder)) draftOrder[key] = ord++;
      });

      // Picks tab: column A = owner, column B = driver. Skip the label row.
      const pickByOwner = {};
      const pickIndex = {};
      const info = {};
      let seq = 0;
      pickRows.forEach(r => {
        const owner = (r[0] || '').trim();
        const driver = cleanName(r[1]);
        if (!owner || !driver || owner.toLowerCase() === 'owner') return;
        const key = owner.toLowerCase();
        pickByOwner[key] = driver;
        pickIndex[key] = seq++;
        info[driver] = { owner: owner, seasonTotal: totals[key] || 0 };
      });

      // One entry per standings owner, sorted by the draft-order list.
      // Owners missing from that list fall back to pick order (if picked) and
      // then standings order, so the board degrades gracefully.
      const list = standingOwners.map(owner => {
        const key = owner.toLowerCase();
        const order = key in draftOrder ? draftOrder[key]
          : key in pickIndex ? 1e6 + pickIndex[key]
          : 2e6;
        return {
          owner: owner,
          seasonTotal: totals[key] || 0,
          driver: pickByOwner[key] || null,
          order: order,
        };
      });
      list.sort((a, b) => a.order - b.order);

      ownerInfo = info;
      ownerList = list;
      draftComplete = list.every(o => o.driver);
      ownerDataLoaded = true;
      return true;
    } catch (e) {
      console.error('Owner sheet load failed:', e);
      return false;
    }
  }

  // ---- Race selection ------------------------------------------------

  // Local Saturday/Sunday. The league drafts after each race and resets the
  // picks sheet before the weekend, so a completed draft means "this
  // weekend's race" on Sat/Sun and "last weekend's race" Mon-Fri.
  function isWeekend() {
    const d = new Date().getDay();   // 0 = Sun, 6 = Sat
    return d === 0 || d === 6;
  }

  // League races from the season schedule, each paired with its start time
  // in epoch ms, sorted oldest first. Cached for SCHEDULE_TTL_MS; on a fetch
  // error the last good copy is reused.
  async function fetchSchedule() {
    if (scheduleCache && Date.now() - scheduleCacheAt < SCHEDULE_TTL_MS) {
      return scheduleCache;
    }
    try {
      const res = await fetch(SCHEDULE_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const races = data['series_' + LEAGUE_SERIES_ID] || [];
      scheduleCache = races
        .filter(r => r.race_date)
        .map(r => ({ race: r, t: new Date(r.race_date).getTime() }))
        .filter(x => !Number.isNaN(x.t))
        .sort((a, b) => a.t - b.t);
      scheduleCacheAt = Date.now();
      return scheduleCache;
    } catch (e) {
      console.error('schedule fetch failed:', e);
      return scheduleCache || [];
    }
  }

  // race_id of a league race running right now (green/yellow/red/white
  // flag), or null. A pre-race or checkered feed, or another series, does
  // not count as live.
  async function liveRaceProbe() {
    try {
      const res = await fetch(LIVE_FEED_URL + '?_=' + Date.now());
      const gf = await res.json();
      if (gf && gf.series_id === LEAGUE_SERIES_ID && gf.race_id
          && gf.flag_state >= 1 && gf.flag_state <= 4) {
        return gf.race_id;
      }
    } catch (e) {
      console.error('live-feed probe failed:', e);
    }
    return null;
  }

  // Decide what a completed draft should show. Stateless, re-derived every
  // refresh:
  //   live      - a league race is running now -> live leaderboard
  //   complete  - a finished race's results: the race that ran within the
  //               last 2 days (keeps results up through the weekend), or
  //               Mon-Fri the most recent race (still "the previous race")
  //   awaiting  - Sat/Sun before this weekend's race has run: owner roster
  //               and season totals only, no prior-race results
  async function resolveRace() {
    const [schedule, liveId] = await Promise.all([
      fetchSchedule(),
      liveRaceProbe(),
    ]);
    const now = Date.now();
    const past = schedule.filter(x => x.t <= now);
    const future = schedule.filter(x => x.t > now);
    const last = past.length ? past[past.length - 1] : null;
    const next = future.length ? future[0].race : null;

    if (liveId) return { mode: 'live', raceId: liveId, race: null };

    const TWO_DAYS = 2 * 24 * 60 * 60 * 1000;
    if (last && now - last.t <= TWO_DAYS) {
      return { mode: 'complete', raceId: last.race.race_id, race: last.race };
    }
    if (isWeekend()) {
      return { mode: 'awaiting', raceId: next && next.race_id, race: next };
    }
    if (last) {
      return { mode: 'complete', raceId: last.race.race_id, race: last.race };
    }
    return { mode: 'awaiting', raceId: next && next.race_id, race: next };
  }

  // The league race's live feed: vehicle data plus lap/flag state. The
  // series-namespaced URL is live during the race and persists afterward.
  async function fetchRaceFeed(raceId) {
    if (!raceId) return null;
    try {
      const url = `https://cf.nascar.com/cacher/live/series_${LEAGUE_SERIES_ID}`
        + `/${raceId}/live-feed.json?_=` + Date.now();
      const res = await fetch(url);
      if (res.ok) return await res.json();
      console.error('race live-feed HTTP ' + res.status);
    } catch (e) {
      console.error('race live-feed fetch failed:', e);
    }
    return null;
  }

  // ---- Rendering: draft board ----------------------------------------

  function renderDraftBoard() {
    document.getElementById('raceView').style.display = 'none';
    document.getElementById('ownerTitle').textContent = 'Draft Board';

    const picked = ownerList.filter(o => o.driver).length;
    document.getElementById('status').textContent =
      `Draft in progress — ${picked} of ${ownerList.length} picks made`;

    document.getElementById('ownerHead').innerHTML =
      '<tr><th>Owner</th><th>Pick</th><th>Season Total</th></tr>';

    const body = document.getElementById('ownerBody');
    body.innerHTML = '';
    let onClockShown = false;
    ownerList.forEach(o => {
      const row = document.createElement('tr');
      let pick;
      if (o.driver) {
        pick = o.driver;
      } else if (!onClockShown) {
        pick = 'on the clock';
        row.className = 'onclock';
        onClockShown = true;
      } else {
        pick = '—';
        row.className = 'muted';
      }
      row.innerHTML =
        `<td>${o.owner}</td><td>${pick}</td><td>${o.seasonTotal}</td>`;
      body.appendChild(row);
    });
    document.getElementById('lastUpdateOwners').textContent =
      new Date().toLocaleTimeString();
  }

  // ---- Rendering: awaiting next race ---------------------------------

  function formatRaceDate(iso) {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '';
    return d.toLocaleDateString(undefined,
      { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // Draft complete, this weekend's race not yet run: show the owner roster
  // with season totals. No leaderboard and no prior-race results.
  function renderAwaiting(nextRace) {
    document.getElementById('raceView').style.display = 'none';
    document.getElementById('ownerTitle').textContent = 'Owners';

    let status = 'Draft complete — race not started';
    if (nextRace && nextRace.race_name) {
      status += ' — ' + nextRace.race_name;
      const when = formatRaceDate(nextRace.race_date);
      if (nextRace.track_name) status += ' at ' + nextRace.track_name;
      if (when) status += ' (' + when + ')';
    }
    document.getElementById('status').textContent = status;

    document.getElementById('ownerHead').innerHTML =
      '<tr><th>Owner</th><th>Driver</th><th>Season Total</th></tr>';

    const rows = ownerList.slice().sort((a, b) => b.seasonTotal - a.seasonTotal);
    const body = document.getElementById('ownerBody');
    body.innerHTML = '';
    rows.forEach(o => {
      const row = document.createElement('tr');
      row.innerHTML =
        `<td>${o.owner}</td><td>${o.driver || '—'}</td>` +
        `<td>${o.seasonTotal}</td>`;
      body.appendChild(row);
    });
    document.getElementById('lastUpdateOwners').textContent =
      new Date().toLocaleTimeString();
  }

  // ---- Rendering: race view ------------------------------------------

  function renderVehicles(feed) {
    const tbody = document.getElementById('liveFeedData');
    tbody.innerHTML = '';
    if (!feed || !Array.isArray(feed.vehicles)) return;
    feed.vehicles.forEach(vehicle => {
      const driverName = cleanName(vehicle.driver && vehicle.driver.full_name);
      const info = ownerInfo[driverName];
      const row = document.createElement('tr');
      if (!info) row.className = 'muted';
      row.innerHTML =
        `<td>${vehicle.vehicle_number}</td><td>${driverName}</td>` +
        `<td>${info ? info.owner : 'undrafted'}</td>`;
      tbody.appendChild(row);
    });
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString();
  }

  function setRaceStatus(feed) {
    const statusEl = document.getElementById('status');
    if (!feed || !Array.isArray(feed.vehicles) || !feed.vehicles.length) {
      statusEl.textContent = 'Draft complete — race not started';
    } else if (feed.flag_state === FLAG_CHECKERED) {
      statusEl.textContent =
        'Race complete' + (feed.run_name ? ' — ' + feed.run_name : '');
    } else {
      statusEl.textContent =
        (feed.run_name ? feed.run_name + ' — ' : '')
        + `Lap ${feed.lap_number || 0}`
        + (feed.laps_in_race ? ` of ${feed.laps_in_race}` : '');
    }
  }

  // Points earned this race, keyed by cleaned driver name. Empty if the feed
  // is unavailable (race not started / failed fetch).
  async function fetchRacePoints(raceId) {
    const earned = {};
    if (!raceId) return earned;
    try {
      const url = `https://cf.nascar.com/live/feeds/series_${LEAGUE_SERIES_ID}`
        + `/${raceId}/live_points.json?_=` + Date.now();
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data)) {
          data.forEach(vehicle => {
            const name = cleanName(
              `${vehicle.first_name || ''} ${vehicle.last_name || ''}`);
            if (name) earned[name] = vehicle.points_earned_this_race || 0;
          });
        }
      } else {
        console.error('Points feed returned HTTP ' + res.status);
      }
    } catch (e) {
      console.error('Points feed fetch failed:', e);
    }
    return earned;
  }

  async function renderRaceView(raceId) {
    document.getElementById('raceView').style.display = '';
    document.getElementById('ownerTitle').textContent = 'Owner Points';

    const [feed, earnedByDriver] = await Promise.all([
      fetchRaceFeed(raceId),
      fetchRacePoints(raceId),
    ]);
    renderVehicles(feed);
    setRaceStatus(feed);

    document.getElementById('ownerHead').innerHTML =
      '<tr><th>Owner</th><th>Driver</th><th>Points Earned This Race</th>'
      + '<th>Season Total</th></tr>';

    // One row per owner; base (pre-race) total + live race points.
    const standings = ownerList.map(o => {
      const earned = (o.driver && earnedByDriver[o.driver]) || 0;
      return {
        owner: o.owner,
        driver: o.driver,
        earned: earned,
        total: o.seasonTotal + earned,
      };
    });
    standings.sort((a, b) => b.total - a.total);

    const body = document.getElementById('ownerBody');
    body.innerHTML = '';
    standings.forEach(s => {
      const row = document.createElement('tr');
      row.innerHTML =
        `<td>${s.owner}</td><td>${s.driver || '—'}</td>` +
        `<td>${s.earned}</td><td>${s.total}</td>`;
      body.appendChild(row);
    });
    document.getElementById('lastUpdateOwners').textContent =
      new Date().toLocaleTimeString();
  }

  // ---- Orchestration -------------------------------------------------

  async function refresh() {
    try {
      // Re-read the sheets every cycle so the draft board updates live and a
      // sheet reset is noticed promptly. Owner data and race state are
      // independent, so fetch them at the same time.
      const [ok, raceInfo] = await Promise.all([loadOwnerInfo(), resolveRace()]);

      if (!ok) {
        // Keep the last good render if we have one; otherwise tell the user
        // why the page is blank rather than inventing numbers.
        if (!ownerDataLoaded) {
          document.getElementById('status').textContent =
            'Could not load owner data — retrying…';
        }
        return;
      }

      if (!draftComplete) {
        renderDraftBoard();
      } else if (raceInfo.mode === 'awaiting') {
        renderAwaiting(raceInfo.race);
      } else {
        await renderRaceView(raceInfo.raceId);
      }
    } catch (error) {
      console.error('Refresh failed:', error);
    }
  }

  (async () => {
    await refresh();
    setInterval(refresh, REFRESH_MS);
  })();
</script>

</body>
</html>
