<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASCAR Live Feed with Points and Season Totals</title>
</head>
<body>

<h2>Lap Number: <span id="lapNumber"></span></h2>

<h2>Vehicle Data</h2>
<table border="1">
  <thead>
    <tr>
      <th>Vehicle Number</th>
      <th>Driver</th>
      <th>Owner</th>
    </tr>
  </thead>
  <tbody id="liveFeedData"></tbody>
</table>

<p>Last Updated: <span id="lastUpdate"></span></p>

<h2>Owner Points Table</h2>
<table border="1">
  <thead>
    <tr>
      <th>Owner</th>
      <th>Driver</th>
      <th>Points Earned This Race</th>
      <th>Season Total Points</th>
      <th>Points +/- from 4th Place</th>
    </tr>
  </thead>
  <tbody id="ownerPointsTable"></tbody>
</table>

<p>Last Updated: <span id="lastUpdatePoints"></span></p>

<script>
  // ---- Configuration -------------------------------------------------

  // Two published-to-web CSV tabs from the same Google Sheet, joined on
  // owner name.
  //   Picks tab    - column A = owner, column B = driver (this week's pick).
  //                  The first row holds the literal labels "owner"/"driver"
  //                  and is skipped.
  //   Standings tab- column C = owner, column D = season points entering
  //                  this race. Rows whose points cell isn't numeric
  //                  (header, totals, blanks) are skipped.
  // Live race points are added on top of the standings total at render time,
  // so the standings tab should hold each owner's pre-race total.
  const PICKS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2xTweYJe4Z4kLiNTxaqqaHHEzF9kZelQMQclZ82Eg5X4l7wEfD57iyg5kJA0hedSIdcT_k0p2sLHM/pub?gid=7&single=true&output=csv';
  const STANDINGS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2xTweYJe4Z4kLiNTxaqqaHHEzF9kZelQMQclZ82Eg5X4l7wEfD57iyg5kJA0hedSIdcT_k0p2sLHM/pub?gid=148&single=true&output=csv';

  // Used only when the picks sheet can't be loaded.
  const FALLBACK_OWNERS = [
    { driver: "Chase Elliott",  owner: "Mark Almaguer",    seasonTotal: 143 },
    { driver: "Kyle Larson",    owner: "Bobby Grobe (#1)", seasonTotal: 134 },
    { driver: "Ryan Blaney",    owner: "David Lee Grobe",  seasonTotal: 142 },
    { driver: "William Byron",  owner: "Tommy Rye",        seasonTotal: 167 },
    { driver: "Joey Logano",    owner: "Jeff Lindhorst",   seasonTotal: 126 },
    { driver: "Ty Gibbs",       owner: "Kris Rye",         seasonTotal: 117 },
    { driver: "Denny Hamlin",   owner: "Travis Penny",     seasonTotal: 172 },
    { driver: "Chase Briscoe",  owner: "Bobby Grobe (#2)", seasonTotal: 127 },
  ];

  const LIVE_FEED_URL = 'https://cf.nascar.com/live/feeds/live-feed.json';
  const REFRESH_MS = 60000;

  // ---- Owner info ----------------------------------------------------

  // Cleaned driver name -> { owner, seasonTotal }. seasonTotal here stays
  // the pre-race base; the live race total is computed fresh each poll and
  // never written back into this object.
  let ownerInfo = {};

  function cleanName(s) {
    // Strip rookie/playoff markers (* #) and collapse whitespace.
    return (s || '').replace(/[*#]/g, '').replace(/\s+/g, ' ').trim();
  }

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
    if (field !== '' || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function buildOwnerInfo(list) {
    const map = {};
    list.forEach(o => {
      const name = cleanName(o.driver);
      if (name) {
        map[name] = {
          owner: (o.owner || 'Unknown').trim(),
          seasonTotal: Number(o.seasonTotal) || 0,
        };
      }
    });
    return map;
  }

  async function fetchCSV(url) {
    // Cache-buster: the published CSV is cached by the browser, so a reload
    // after a sheet edit could otherwise be served a stale copy.
    const res = await fetch(url + '&_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return parseCSV(await res.text());
  }

  async function loadOwnerInfo() {
    try {
      const pickRows = await fetchCSV(PICKS_CSV_URL);
      const standingRows = await fetchCSV(STANDINGS_CSV_URL)
        .catch(e => { console.error('Standings load failed:', e); return []; });

      // Standings: column C = owner, column D = season points. Skip rows
      // whose points cell isn't numeric (header row, totals, blanks).
      const totals = {};
      standingRows.forEach(r => {
        const owner = (r[2] || '').trim();
        const pts = Number(r[3]);
        if (owner && !Number.isNaN(pts)) totals[owner.toLowerCase()] = pts;
      });

      // Picks: column A = owner, column B = driver. The first row holds the
      // literal labels "owner"/"driver" and is skipped.
      const map = {};
      pickRows.forEach(r => {
        const owner = (r[0] || '').trim();
        const driver = cleanName(r[1]);
        if (!owner || !driver || owner.toLowerCase() === 'owner') return;
        map[driver] = {
          owner: owner,
          seasonTotal: totals[owner.toLowerCase()] || 0,
        };
      });

      if (Object.keys(map).length === 0) throw new Error('no picks parsed');
      ownerInfo = map;
      return;
    } catch (e) {
      console.error('Owner sheet load failed, using fallback:', e);
      ownerInfo = buildOwnerInfo(FALLBACK_OWNERS);
    }
  }

  // ---- Live feed (vehicle table) -------------------------------------

  async function fetchLiveFeed() {
    const res = await fetch(LIVE_FEED_URL);
    const data = await res.json();

    const liveFeedData = document.getElementById('liveFeedData');
    if (!data || !Array.isArray(data.vehicles)) {
      console.error('Invalid live-feed structure or missing data.');
      return null;
    }

    document.getElementById('lapNumber').textContent = data.lap_number ?? '';
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

    liveFeedData.innerHTML = '';
    data.vehicles.forEach(vehicle => {
      const driverName = cleanName(vehicle.driver && vehicle.driver.full_name);
      const info = ownerInfo[driverName] || { owner: 'Unknown' };
      const row = document.createElement('tr');
      row.innerHTML =
        `<td>${vehicle.vehicle_number}</td><td>${driverName}</td><td>${info.owner}</td>`;
      liveFeedData.appendChild(row);
    });

    // race_id / series_id drive the per-race points URL below.
    return data;
  }

  // ---- Points feed (owner points table) ------------------------------

  async function fetchPoints(seriesId, raceId) {
    const ownerPointsTable = document.getElementById('ownerPointsTable');

    if (!seriesId || !raceId) {
      console.error('No race id available from live feed; skipping points.');
      return;
    }

    // Race id is derived from the live feed, not hardcoded.
    const url =
      `https://cf.nascar.com/live/feeds/series_${seriesId}/${raceId}/live_points.json`;

    const res = await fetch(url);
    if (!res.ok) {
      console.error('Points feed returned HTTP ' + res.status + ' for ' + url);
      return;
    }
    const data = await res.json();

    document.getElementById('lastUpdatePoints').textContent =
      new Date().toLocaleTimeString();
    ownerPointsTable.innerHTML = '';

    if (!Array.isArray(data)) {
      console.error('Invalid points data structure.');
      return;
    }

    const standings = [];
    data.forEach(vehicle => {
      const driverName = cleanName(
        `${vehicle.first_name || ''} ${vehicle.last_name || ''}`
      );
      const info = ownerInfo[driverName];
      if (!info) return;

      const earned = vehicle.points_earned_this_race || 0;
      standings.push({
        driver: driverName,
        owner: info.owner,
        earned: earned,
        // base (pre-race) + live race points, recomputed every poll.
        total: info.seasonTotal + earned,
      });
    });

    standings.sort((a, b) => b.total - a.total);
    const fourthPlaceTotal = standings.length >= 4 ? standings[3].total : 0;

    standings.forEach(s => {
      const diff = s.total - fourthPlaceTotal;
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${s.owner}</td>
        <td>${s.driver}</td>
        <td>${s.earned}</td>
        <td>${s.total}</td>
        <td>${diff >= 0 ? '+' : ''}${diff}</td>
      `;
      ownerPointsTable.appendChild(row);
    });
  }

  // ---- Orchestration -------------------------------------------------

  async function refresh() {
    try {
      const feed = await fetchLiveFeed();
      if (feed) await fetchPoints(feed.series_id, feed.race_id);
    } catch (error) {
      console.error('Refresh failed:', error);
    }
  }

  (async () => {
    await loadOwnerInfo();
    await refresh();
    setInterval(refresh, REFRESH_MS);
  })();
</script>

</body>
</html>
